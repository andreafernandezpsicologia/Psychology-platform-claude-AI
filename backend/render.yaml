services:
  - type: web
    name: studio-renacer-api
    runtime: node
    region: frankfurt
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: node app.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_PUBLISHABLE_KEY
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: FROM_EMAIL
        value: Studio Renacer <admin@studiorenacer.com>
      - key: FRONTEND_URL
        sync: false
      - key: CRON_SECRET
        sync: false
      - key: PORT
        value: 3000
